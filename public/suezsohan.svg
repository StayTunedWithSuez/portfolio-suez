<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  
  <defs>
    <!-- Purple Gradient Background -->
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9271f6"/>
      <stop offset="100%" stop-color="#682ad2"/>
    </linearGradient>
  </defs>

  <!-- Gradient Background -->
  <rect width="100" height="100" rx="100" fill="url(#bgGradient)"/>

  <!-- White Letter -->
  <text 
    x="50" 
    y="60" 
    font-size="80"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="white"
    font-family="Arial"
    font-weight="bold">
    S
  </text>

</svg>